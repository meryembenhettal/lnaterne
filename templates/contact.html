<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Lanterne</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #0d1a2b, #1a2f40, #264766);
      color: white;
      margin: 0;
      padding: 0;
      padding-top: 80px; 
    }

     header {
      display: flex;
      align-items: center;
      justify-content: space-between; 
      padding: 20px 10%;
      background: #0d1a2b;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      backdrop-filter: blur(5px);
    }

    .logo img {
      height: 60px;
      width: 130px;
    }

    .logo {
      margin-right: auto;
    }

    nav {
      display: flex;
      gap: 10px;
      margin: 0 auto; 
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #717a7e;
    }

    #themeToggle {
      margin-right: 20px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: white;
    }

    .container {
      padding: 150px 10% 50px;
    }

    h1 {
      font-size: 36px;
      color: #3399ff;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      color: #eee;
    }

    form input,
    form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background-color: #333;
      border: none;
      color: white;
      border-radius: 4px;
    }

    form button {
      padding: 10px 25px;
      background-color: #3399ff;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }

    form button:hover {
      background-color: #287bcc;
    }

    footer {
      background-color: #0d1a2b;
      text-align: center;
      padding: 30px;
      margin-top: 80px;
    }

    footer a {
      color: #3399ff;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Light mode */
     body.light-mode {
      background: linear-gradient(to right, #f0f6ff, #e0ecff, #d0e2ff);
      color: #222;
    }

    body.light-mode header {
      background-color: #cce0f0;
      color: #222;
      backdrop-filter: none;
    }

    body.light-mode nav a {
      color: #222;
    }

    body.light-mode nav a:hover {
      color: #005599;
    }

    
    body.light-mode input,
    body.light-mode textarea {
      color: #222;
      background-color: #f5f5f5;
    }

    body.light-mode h1 {
      color: #3399ff;
    }

    body.light-mode form button {
      background-color: #005599;
    }

    body.light-mode footer {
      background-color: #cce0f0;
      color: #222;
    }

    body.light-mode footer a {
      color: #005599;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="/static/images/lanterne.png" alt="Lanterne Logo">
    </div>
    <button id="themeToggle" title="Changer de mode">🌙</button>
    <nav>
      <a href="{{ url_for('principal') }}">Accueil</a>
      <a href="{{ url_for('a_propos') }}">À propos</a>
      <a href="{{ url_for('fonctionnalite') }}">Fonctionnalités</a>
      <a href="{{ url_for('contact') }}">Contact</a>
      <a href="{{ url_for('connexion') }}">Se connecter</a>
    </nav>
  </header>

  <div class="container">
    <h1>Contactez-nous</h1>
    <p>Une question, une suggestion ou un signalement ? Écrivez-nous :</p>
    <form>
      <input type="text" placeholder="Nom complet" required />
      <input type="email" placeholder="Adresse email" required />
      <textarea rows="6" placeholder="Votre message" required></textarea>
      <button type="submit">Envoyer</button>
    </form>
  </div>

  <footer>
    <p>© 2025 Lanterne. Tous droits réservés.</p>
    <p>
      <a href="#">Politique de confidentialité</a> |
      <a href="#">Termes et conditions</a> |
      <a href="#">Contact</a>
    </p>
  </footer>

  <script>
    const toggleButton = document.getElementById("themeToggle");
    const body = document.body;

    toggleButton.addEventListener("click", () => {
      body.classList.toggle("light-mode");

      if (body.classList.contains("light-mode")) {
        toggleButton.textContent = "☀️";
      } else {
        toggleButton.textContent = "🌙";
      }
    });
  </script>
</body>
</html>
